name: Upload Maximusbat Theme to Mega

on:
  push:
    branches:
      - main  # Esegui quando fai push su main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Install rclone
      - name: Install rclone
        run: |
          curl -Of https://downloads.rclone.org/rclone-current-linux-amd64.zip
          unzip rclone-current-linux-amd64.zip
          sudo cp rclone-*-linux-amd64/rclone /usr/bin/
          sudo chmod 755 /usr/bin/rclone
          rclone version

      # Step 3: Create rclone config from secret
      - name: Setup rclone config
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF }}" > ~/.config/rclone/rclone.conf
          cat ~/.config/rclone/rclone.conf
          
      # Step 4: Upload folder to Mega
      - name: Upload Maximusbat Theme to Mega
        run: |
          # Cancella cartella remota se vuoi sostituirla
          rclone purge MBT-Themes:Maximusbat || true
          # Carica la cartella locale nella cartella remota
          rclone copy ./Maximusbat MBT-Themes:Maximusbat --progress
          echo "--------------------------------------------"
          echo "Uploading Maximusbat Theme to Mega"
          echo "Local folder: ${{ env.LOCAL_PATH }}"
          echo "Remote: ${{ env.REMOTE_NAME }}:${{ env.REMOTE_PATH }}"
          echo "--------------------------------------------"
          rclone sync "${{ env.LOCAL_PATH }}" "${{ env.REMOTE_NAME }}:${{ env.REMOTE_PATH }}" --progress --delete-excluded
          echo "Upload completed!"
