name: Upload Maximusbat Theme to Mega

on:
  push:
    branches:
      - main

jobs:
  upload:
    runs-on: ubuntu-latest
    env:
      # Secret con il contenuto del tuo rclone.conf
      RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
      REMOTE_NAME: MBT-Themes          # Nome del remote Mega definito nel rclone.conf
      REMOTE_PATH: Maximusbat          # Cartella remota su Mega
      LOCAL_PATH: themes/Maximusbat    # Cartella locale nel repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash
          mkdir -p $HOME/.config/rclone
          echo "$RCLONE_CONF" > $HOME/.config/rclone/rclone.conf

      - name: Upload Maximusbat to Mega
        run: |
          echo "--------------------------------------------"
          echo "Uploading Maximusbat Theme to Mega"
          echo "Local folder: ${{ env.LOCAL_PATH }}"
          echo "Remote: ${{ env.REMOTE_NAME }}:${{ env.REMOTE_PATH }}"
          echo "--------------------------------------------"
          rclone sync "${{ env.LOCAL_PATH }}" "${{ env.REMOTE_NAME }}:${{ env.REMOTE_PATH }}" --progress --delete-excluded
          echo "Upload completed!"