name: Upload Maximusbat Theme to Mega

on:
  push:
    branches:
      - main

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout del repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Installazione rclone
      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      # 3️⃣ Configura rclone dal secret
      - name: Setup rclone config
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF }}" > ~/.config/rclone/rclone.conf

      # 4️⃣ Verifica che rclone riconosca il remote
      - name: Test rclone remote
        run: rclone listremotes

      # 5️⃣ Upload della cartella Maximusbat su Mega
      - name: Upload Theme to Mega
        run: |
          # MBT-Themes è il remote definito in rclone.conf
          rclone copy -v "./Maximusbat" "MBT-Themes:Maximusbat" --create-empty-src-dirs --progress
          
